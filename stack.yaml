  - colour-2.3.7@sha256:613dc8d5f6e51babe57398a742ab8d5c2964fa98b773f3bf6e6a72b7e87f1c6e,2543
  - prettyprinter-1.7.2@sha256:e3a802ea939d465b2e37b9fa09d8e5bb88b5775d6d62dd2ec6ca32b63416656d,6618
  - prettyprinter-ansi-terminal-1.1.4@sha256:5184ba6002a650de3307547347eaba19bdc9b82eb68e943f406818caa215ce4f,3134

# Override default flag values for local packages and extra-deps
